name: Bug report
description: Report a reproducible continuity-kit problem.
title: "[bug] "
labels: ["bug"]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: Windows 11 / macOS / Linux
    validations:
      required: true
  - type: textarea
    id: command
    attributes:
      label: Command
      description: Paste the command. Redact private paths.
      render: powershell
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output or error
      description: Paste sanitized output only.
      render: text
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Sanitized sample
      description: Include a minimal sanitized JSONL line only if needed.
      render: json
    validations:
      required: false
