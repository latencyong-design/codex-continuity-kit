name: Validate

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: PowerShell validation on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
          - ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run tests
        shell: pwsh
        run: ./tests/Run-ExportCodexSessionIndex.Tests.ps1
